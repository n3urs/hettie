# Netlify configuration — static site, no build step.
[build]
  publish = "."
  command = ""

# Pretty admin URL + SPA-style fallback for the CMS.
[[redirects]]
  from = "/admin"
  to = "/admin/"
  status = 301

# Security headers.
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "SAMEORIGIN"
    Referrer-Policy = "strict-origin-when-cross-origin"
