<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Content Manager — Hettie</title>
  <meta name="robots" content="noindex">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%23073b4c'/%3E%3Cg fill='none' stroke='%232ec4b6' stroke-width='3.2' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpath d='M18 38 a14 11 0 0 1 28 0'/%3E%3Cpath d='M26 29 v-5'/%3E%3Cpath d='M38 29 v-5'/%3E%3Cpath d='M18 36 q-8 -1 -11 4'/%3E%3Cpath d='M46 36 q8 -1 11 4'/%3E%3Cpath d='M22 42 l-7 6'/%3E%3Cpath d='M42 42 l7 6'/%3E%3C/g%3E%3C/svg%3E">
</head>
<body>
  <!-- Netlify Identity widget: powers login for the CMS -->
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <!-- Decap CMS (the open-source Netlify CMS) -->
  <script src="https://unpkg.com/decap-cms@^3.3.3/dist/decap-cms.js"></script>
  <script>
    // After an invite email, redirect back into the CMS once logged in.
    if (window.netlifyIdentity) {
      window.netlifyIdentity.on("init", function (user) {
        if (!user) {
          window.netlifyIdentity.on("login", function () {
            document.location.href = "/admin/";
          });
        }
      });
    }
  </script>
</body>
</html>
